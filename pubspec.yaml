name: flutter_template
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  auto_route: ^11.1.0
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  dartz: ^0.10.1
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  hive: ^2.2.3
  intl: ^0.20.2
  loading_animation_widget: ^1.3.0
  oktoast: ^3.4.0
  pinput: ^6.0.2
  cached_network_image: ^3.4.1
  image_cropper: ^12.2.1
  image_picker: ^1.2.2
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  flutter_google_maps_webservices: ^1.1.1
  geolocator: ^14.0.2
  google_fonts: ^8.1.0
  pull_to_refresh: ^2.0.0
  carousel_slider: ^5.1.2
  lottie: ^3.3.3
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  shimmer: ^3.0.0
  app_settings: ^7.0.0
  flutter_local_notifications: ^21.0.0
  connectivity_plus: ^7.1.1
  screen_protector: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  auto_route_generator: ^10.5.0
  build_runner: ^2.14.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/applogo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/icons/2x/
    - assets/icons/3x/

  fonts:
    - family: broken
      fonts:
        - asset: assets/fonts/broken.ttf
    - family: broken_filled
      fonts:
        - asset: assets/fonts/broken_filled.ttf
